<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>BOOM STICK — Apex Strike</title>
    <link rel="stylesheet" href="./style/styles.css">
</head>
<body>
<div id="game-root">
    <div id="sky">
        <div id="sun"></div>
        <div id="moon"></div>
        <div id="stars"></div>
    </div>
    <div id="parallax-far"></div>
    <div id="parallax-mid"></div>
    <div id="clouds"></div>
    <div id="ground"></div>

    <div id="game" class="game-box">
        <div id="cannon-base"></div>
        <div id="cannon-pivot">
            <div id="cannon"></div>
            <div id="muzzle"></div>
        </div>
        <div id="crosshair"></div>
    </div>

    <div id="hud">
        <div class="hud-block">
            <div class="hud-label">SCORE</div>
            <div id="score" class="hud-value">0</div>
        </div>
        <div class="hud-block">
            <div class="hud-label">WAVE</div>
            <div id="wave" class="hud-value">1</div>
        </div>
        <div class="hud-block">
            <div class="hud-label">COMBO</div>
            <div id="combo" class="hud-value">x0</div>
        </div>
        <div class="hud-block hud-health">
            <div class="hud-label">HULL</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="hud-block hud-level">
            <div class="hud-label">LEVEL</div>
            <div id="level" class="hud-value">1</div>
        </div>
        <div class="hud-block hud-xp">
            <div class="hud-label">XP</div>
            <div id="xp-bar"><div id="xp-fill"></div></div>
        </div>
        <div class="hud-block">
            <div class="hud-label">ACCURACY</div>
            <div id="accuracy" class="hud-value">100%</div>
        </div>
        <div class="hud-block hud-best">
            <div class="hud-label">BEST</div>
            <div id="best" class="hud-value">0</div>
        </div>
    </div>

    <div id="spec-bar"></div>
    <div id="message-layer"></div>

    <button id="pause" class="control-btn" title="Pause (Space)">II</button>
    <button id="mute" class="control-btn" title="Mute (M)">♪</button>

    <div id="start-screen" class="overlay">
        <div class="overlay-inner">
            <h1 class="title-glow">BOOM<span>STICK</span></h1>
            <p class="tagline">Defend the skies. Stack the combo. Survive the boss.</p>
            <div class="controls">
                <div><span class="key">MOUSE</span> Aim</div>
                <div><span class="key">CLICK</span> Fire</div>
                <div><span class="key">SPACE</span> Pause</div>
                <div><span class="key">M</span> Mute</div>
                <div><span class="key">R</span> Restart</div>
            </div>
            <button id="start-btn" class="big-btn">DEPLOY</button>
        </div>
    </div>

    <div id="gameover-screen" class="overlay hidden">
        <div class="overlay-inner">
            <h1 class="title-glow danger">WRECKED</h1>
            <div id="final-stats"></div>
            <button id="restart-btn" class="big-btn">REPLAY</button>
        </div>
    </div>

    <div id="pause-screen" class="overlay hidden">
        <div class="overlay-inner">
            <h1 class="title-glow">PAUSED</h1>
            <button id="resume-btn" class="big-btn">RESUME</button>
        </div>
    </div>

    <div id="levelup-screen" class="overlay hidden">
        <div class="overlay-inner levelup-inner">
            <h1 class="title-glow">LEVEL <span id="lvl-up-level">2</span></h1>
            <p class="tagline">Choose an upgrade</p>
            <div id="upgrade-cards"></div>
        </div>
    </div>
</div>
<script type="text/javascript" src="./script/main.js"></script>
</body>
</html>
